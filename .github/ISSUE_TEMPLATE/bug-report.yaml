name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
assignees:
  - SalvaChiLlo
body:
  - type: markdown
    attributes:
      value: |
        ## Before creating a bug report

        * Make sure you are running the latest version of the app
        * Check the [documentation](https://github.com/SalvaChiLlo/statistics-for-endurain/blob/master/docs/home.md) to see if your issue is already addressed in the troubleshooting section
        * Search the [existing GitHub issues](https://github.com/SalvaChiLlo/statistics-for-endurain/issues?q=is:issue) to verify that your issue has not been addressed yet
  - type: textarea
    id: the-bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: docker-compose-config
    attributes:
      label: Provide your docker compose config
      description: Be sure to redact sensitive information
      render: yml
    validations:
      required: true
  - type: textarea
    id: environment-config
    attributes:
      label: Environment configuration
      description: Please list your app version, PHP/Docker versions, and any relevant `.env` values (redact secrets like `APP_SECRET`, `ENDURAIN_PASSWORD`, `ADMIN_PASSWORD_HASH`)
      render: yml
    validations:
      required: true